<!DOCTYPE html>
<html>

<head>

    <title>Settings</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">

    <div class="container-fluid">

        <span class="navbar-brand">
            Settings
        </span>

        <div class="d-flex gap-2">

            <a href="/dashboard"
               class="btn btn-outline-light">
                Dashboard
            </a>

            <a href="/logout"
               class="btn btn-danger">
                Logout
            </a>

        </div>

    </div>

</nav>

<div class="container mt-4">

    {% if success %}
        <div class="alert alert-success">
            {{ success }}
        </div>
    {% endif %}

    {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
    {% endif %}

    <div class="row g-4">

        <div class="col-lg-6">

            <div class="card">

                <div class="card-header">
                    <h4 class="mb-0">Account</h4>
                </div>

                <div class="card-body">

                    <form action="/settings/account"
                          method="post">

                        <div class="mb-3">

                            <label class="form-label">
                                Username
                            </label>

                            <input type="text"
                                   name="username"
                                   class="form-control"
                                   value="{{ user.username }}"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                New Password
                            </label>

                            <input type="password"
                                   name="password"
                                   class="form-control"
                                   autocomplete="new-password">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Confirm New Password
                            </label>

                            <input type="password"
                                   name="confirm_password"
                                   class="form-control"
                                   autocomplete="new-password">

                        </div>

                        <button class="btn btn-primary">
                            Save Changes
                        </button>

                    </form>

                </div>

            </div>

        </div>

        <div class="col-lg-6">

            <div class="card border-danger">

                <div class="card-header text-bg-danger">
                    <h4 class="mb-0">Database</h4>
                </div>

                <div class="card-body">

                    <p>
                        Customer records in database:
                        <strong>{{ total_customers }}</strong>
                    </p>

                    <button type="button"
                            class="btn btn-danger"
                            data-bs-toggle="modal"
                            data-bs-target="#clearDatabaseModal">
                        Clear Database
                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

<div class="modal fade"
     id="clearDatabaseModal"
     tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">
                    Clear Database?
                </h5>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                </button>

            </div>

            <form action="/settings/clear-database"
                  method="post">

                <div class="modal-body">

                    <p>
                        This will permanently delete all customer records.
                    </p>

                    <label class="form-label">
                        Type CLEAR to confirm
                    </label>

                    <input type="text"
                           name="confirmation"
                           class="form-control"
                           required>

                </div>

                <div class="modal-footer">

                    <button type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal">
                        Cancel
                    </button>

                    <button type="submit"
                            class="btn btn-danger">
                        Clear Database
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
